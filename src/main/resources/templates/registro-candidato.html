<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar candidato — Flowmatic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/registro.css}">
</head>
<body class="page-auth">

<div class="loader-overlay" id="loader">
  <div class="loader"></div>
</div>

<div class="split-container">

  <div class="split-form">
    <div class="split-form-box">

      <div style="display:flex; justify-content:center; margin-bottom:20px;">
        <a th:href="@{/}" title="Ir al inicio" class="logo-link">
          <span th:replace="~{fragments/logo :: logoFull}"></span>
        </a>
      </div>

      <h2 style="text-align:center; margin-bottom:24px;">Crear cuenta</h2>

      <div th:if="${mensajePendiente}" class="alert alert-success">
        Cuenta creada. Revisa tu correo para activarla.
      </div>
      <div th:if="${errorDuplicado}" class="alert alert-error">
        Este correo ya está registrado.
      </div>

      <form th:action="@{/registro/candidato}" th:object="${usuario}" method="post" id="formRegistro">

        <div class="form-group">
          <label class="form-label">Nombre</label>
          <input class="form-input" type="text" th:field="*{username}" required
                 minlength="2" maxlength="50"
                 pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]+" title="Solo letras y espacios"
                 placeholder="Tu nombre"/>
          <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="error-msg"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Apellido</label>
          <input class="form-input" type="text" th:field="*{apellido}" required
                 minlength="2" maxlength="50"
                 pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]+" title="Solo letras y espacios"
                 placeholder="Tu apellido"/>
          <span th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}" class="error-msg"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Correo</label>
          <input class="form-input" type="email" th:field="*{email}" required maxlength="100"
                 placeholder="correo@ejemplo.com"/>
          <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-msg"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input class="form-input" type="password" th:field="*{clave}" required
                 minlength="8" maxlength="100" placeholder="Mínimo 8 caracteres"/>
          <span th:if="${#fields.hasErrors('clave')}" th:errors="*{clave}" class="error-msg"></span>
        </div>

        <h3 style="font-size:16px; font-weight:600; color:var(--fm-text); margin:20px 0 12px;">Información profesional</h3>

        <div class="form-group">
          <label class="form-label">Cargo actual / Puesto de interés</label>
          <input class="form-input" type="text" th:field="*{cargo}" maxlength="100"
                 placeholder="Ej: Desarrollador Java Senior"/>
        </div>

        <div class="form-group">
          <label class="form-label">Ciudad</label>
          <input class="form-input" type="text" th:field="*{ciudad}" maxlength="100"
                 placeholder="Ej: Lima, Perú"/>
        </div>

        <div class="form-group">
          <label class="form-label">LinkedIn</label>
          <input class="form-input" type="url" th:field="*{linkedin}" maxlength="255"
                 placeholder="https://linkedin.com/in/tu-perfil"/>
        </div>

        <div class="form-group">
          <label class="form-label">Tecnologías (separadas por coma)</label>
          <input class="form-input" type="text" th:field="*{tecnologias}" maxlength="500"
                 placeholder="Ej: Java, Spring Boot, PostgreSQL, Docker"/>
        </div>

        <div class="form-group">
          <label class="form-label">Idiomas (separados por coma)</label>
          <input class="form-input" type="text" th:field="*{idiomas}" maxlength="255"
                 placeholder="Ej: Español (Nativo), Inglés (B1)"/>
        </div>

        <div class="form-group">
          <label class="form-label">Años de experiencia</label>
          <input class="form-input" type="number" th:field="*{experiencia}" min="0" max="50"
                 placeholder="Ej: 5"/>
        </div>

        <div class="form-group">
          <label class="form-label">Disponibilidad</label>
          <select class="form-input" th:field="*{disponibilidad}">
            <option value="">Seleccionar...</option>
            <option value="Inmediata">Inmediata</option>
            <option value="2 semanas">2 semanas</option>
            <option value="1 mes">1 mes</option>
            <option value="3 meses">3 meses</option>
            <option value="Negociable">Negociable</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Registrarme</button>
      </form>
      <p style="text-align:center; margin-top:16px; font-size:13px; color:var(--fm-text-muted);">
        ¿Ya tienes cuenta?
        <a class="fm-link" th:href="@{/login}">Inicia sesión</a>
      </p>

    </div>
  </div>

  <div class="split-visual">
    <div class="split-visual-decor" style="top:-80px; right:-80px; width:160px; height:160px;"></div>
    <div class="split-visual-decor" style="bottom:-60px; left:-60px; width:120px; height:120px;"></div>
    <div class="split-visual-decor" style="top:33%; left:28%; width:80px; height:80px; border-width:1px;"></div>

    <div class="split-visual-content">
      <a th:href="@{/}" title="Ir al inicio" class="logo-link">
        <span th:replace="~{fragments/logo :: logoFull}"></span>
      </a>
      <p class="split-visual-tagline">Tu proceso de selección, digitalizado</p>

      <ul class="split-visual-bullets">
        <li>
          <span class="split-visual-check">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
          <span class="split-visual-list-text">Sube tus documentos fácilmente</span>
        </li>
        <li>
          <span class="split-visual-check">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
          <span class="split-visual-list-text">Sigue el estado de tu candidatura</span>
        </li>
        <li>
          <span class="split-visual-check">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
          <span class="split-visual-list-text">Comunicación directa con RRHH</span>
        </li>
      </ul>
    </div>
  </div>

</div>

<script>
  document.getElementById("formRegistro").addEventListener("submit", () => {
    document.getElementById("loader").style.display = "flex";
  });
</script>
<script th:src="@{/js/i18n.js}"></script>
</body>
</html>
