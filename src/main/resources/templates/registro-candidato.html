<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registrar candidato</title>
    <link rel="stylesheet" th:href="@{/css/registro.css}">
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="loader"></div>
</div>

<div class="container">

    <div class="form-section">
        <div class="form-box">

            <h2>Registrar candidato</h2>

            <div th:if="${mensajePendiente}" class="alert alert-success">
                ✅ Cuenta creada, revisa tu correo
            </div>

            <div th:if="${errorDuplicado}" class="alert alert-error">
                ❗ Correo ya registrado
            </div>

            <form th:action="@{/registro/candidato}" th:object="${usuario}" method="post" id="formRegistro">

                <div class="input-group">
                    <label>Nombre</label>
                    <input type="text" th:field="*{username}">
                </div>

                <div class="input-group">
                    <label>Apellido</label>
                    <input type="text" th:field="*{apellido}">
                </div>

                <div class="input-group">
                    <label>Correo</label>
                    <input type="email" th:field="*{email}">
                </div>

                <div class="input-group">
                    <label>Teléfono</label>
                    <input type="tel" th:field="*{telefono}">
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" th:field="*{clave}">
                </div>

                <input type="hidden" th:field="*{rol}" value="ROLE_USER"/>

                <button type="submit">Registrar</button>
            </form>

            <a th:href="@{/login}">¿Ya tienes cuenta?</a>

        </div>
    </div>

    <div class="image-section">
        <video autoplay muted loop class="bg-video">
            <source th:src="@{/videos/flowmatic-registro-candidato.mp4}" type="video/mp4">
        </video>
    </div>

</div>

<script>
document.getElementById("formRegistro").addEventListener("submit", () => {
    document.getElementById("loader").style.display = "flex";
});
</script>

</body>
</html>
