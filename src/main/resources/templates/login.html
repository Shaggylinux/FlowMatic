<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="container">

    <div class="form-section">
        <div class="form-box">

            <h2>Iniciar Sesión</h2>

            <div th:if="${param.error}" class="error">
                Usuario o contraseña incorrectos, o cuenta no activada
            </div>

            <div th:if="${param.logout}" class="success">
                Sesión cerrada correctamente
            </div>

            <form th:action="@{/login}" method="post">

                <div class="input-group">
                    <label>Usuario</label>
                    <input type="text" name="username" placeholder="Ingresa tu usuario" required>
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>

                <button type="submit">Ingresar</button>

            </form>

            <a th:href="@{/registro}">¿No tienes cuenta? Regístrate</a>

        </div>
    </div>

  <div class="image-section">
        <video autoplay muted loop class="bg-video">
            <source src="/videos/flowmatic-login.mp4" type="video/mp4">
        </video>
    </div>

</div>

</body>
</html>
