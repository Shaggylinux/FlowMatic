<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Drive</title>
    <link rel="stylesheet" th:href="@{/css/drive.css}">
</head>

<body>

<div class="drive-wrapper">

    <div class="sidebar">
        <h2>📁 Flowmatic</h2>

        <a th:href="@{/}">Mi Drive</a>

        <div class="logout">
            <a th:href="@{/login?logout}">Cerrar sesión</a>
        </div>
    </div>

    <div class="main-content">

        <div class="header">
            <h2>Mi Drive</h2>
        </div>

        <div class="actions">

            <form th:action="@{/crear-carpeta}" method="post">
                <input type="hidden" name="folderDestino" th:value="${folderActual}">
                <input type="text" name="nombre" placeholder="Nueva carpeta..." required>
                <button type="submit">Crear</button>
            </form>

            <form th:action="@{/subir-archivo}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="folderDestino" th:value="${folderActual}">
                <input type="file" name="archivo" required>
                <button type="submit">Subir</button>
            </form>

        </div>

        <div class="table-container">
            <table>

                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="item : ${objetos}">

                        <td>
                            <span th:if="${item.esCarpeta}">
                                📁
                                <a th:href="@{/(folder=${folderActual + (folderActual.isEmpty() ? '' : '/') + item.nombre})}"
                                   th:text="${item.nombre}">
                                </a>
                            </span>

                            <span th:if="${!item.esCarpeta}">
                                📄 [[${item.nombre}]]
                            </span>
                        </td>

                        <td th:text="${item.esCarpeta ? 'Carpeta' : 'Archivo'}"></td>

                        <td>
                            <div th:if="${!item.esCarpeta}">

                                <a th:href="@{/descargar(archivoId=${item.id})}">
                                    Descargar
                                </a>

                                <form th:action="@{/eliminar}" method="post"
                                      onsubmit="return confirm('¿Eliminar archivo?');">
                                    <input type="hidden" name="archivoId" th:value="${item.id}">
                                    <button type="submit">Eliminar</button>
                                </form>

                            </div>

                            <div th:if="${item.esCarpeta}">
                                —
                            </div>
                        </td>

                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</div>

</body>
</html>
