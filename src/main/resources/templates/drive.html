<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Drive</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div class="container" style="width: 800px;"> <h2>📁 Mi Drive</h2>

    <div style="margin-bottom: 20px;">

        <form th:action="@{/crear-carpeta}" method="post" style="margin-bottom:10px;">
            <input type="hidden" name="folderDestino" th:value="${folderActual}">
            <input type="text" name="nombre" placeholder="Nueva carpeta..." required>
            <button type="submit">Crear</button>
        </form>

        <form th:action="@{/subir-archivo}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="folderDestino" th:value="${folderActual}">
            <input type="file" name="archivo" required>
            <button type="submit">Subir</button>
        </form>

    </div>

    <div style="overflow-x:auto;">
        <table style="width:100%; border-collapse: collapse;">

            <thead>
                <tr style="background:#f0f0f0;">
                    <th style="padding:10px; text-align:left;">Nombre</th>
                    <th style="padding:10px;">Tipo</th>
                    <th style="padding:10px;">Acciones</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="item : ${objetos}" style="border-bottom:1px solid #ddd;">

                    <td style="padding:10px;">
                        <span th:if="${item.esCarpeta}">
                            📁 
                            <a th:href="@{/(folder=${folderActual + (folderActual.isEmpty() ? '' : '/') + item.nombre})}" 
                               th:text="${item.nombre}"
                               style="text-decoration:none; color:#4facfe;">
                            </a>
                        </span>

                        <span th:if="${!item.esCarpeta}">
                            📄 [[${item.nombre}]]
                        </span>
                    </td>

                    <td style="text-align:center;" 
                        th:text="${item.esCarpeta ? 'Carpeta' : 'Archivo'}">
                    </td>

                    <td style="padding:10px;">
                        <div th:if="${!item.esCarpeta}">
                            <form th:action="@{/compartir}" method="post" style="display:flex; gap:5px; margin-bottom: 5px;">
                                <input type="hidden" name="archivoId" th:value="${item.id}">
                                <input type="email" name="correoDestino" 
                                       placeholder="Correo destino..." 
                                       required 
                                       style="padding:4px; font-size:12px; border:1px solid #ccc; border-radius:3px; width:140px;">
                                <button type="submit" 
                                        style="padding:4px 8px; font-size:12px; background:#4facfe; color:white; border:none; border-radius:3px; cursor:pointer;">
                                    Compartir
                                </button>
                            </form>

<form th:if="${item.propietario == usuarioActual}" 
      th:action="@{/eliminar}" 
      method="post" 
      onsubmit="return confirm('¿Estás seguro de eliminar este archivo?');">
    
    <input type="hidden" name="archivoId" th:value="${item.id}">
    
    <button type="submit" 
            style="padding:4px 8px; font-size:12px; background:#ff4d4d; color:white; border:none; border-radius:3px; cursor:pointer; width: 100%;">
        🗑️ Eliminar
    </button>
</form>
                        </div>
                        
                        <div th:if="${item.esCarpeta}" style="text-align:center; color:#999; font-size:12px;">
                            —
                        </div>
                    </td>

                </tr>
            </tbody>

        </table>
    </div>

    <div class="link" style="margin-top: 20px;">
        <a th:href="@{/login?logout}">Cerrar sesión</a>
    </div>

</div>

</body>
</html>
