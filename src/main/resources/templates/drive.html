<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Drive</title>
    <link rel="stylesheet" th:href="@{/css/drive.css}">
    <link rel="stylesheet" th:href="@{/css/contenedor.css}">
</head>

<body>

<div class="drive-wrapper">

    <div class="sidebar">
        <h2>📁 Flowmatic</h2>

        <div class="new-folder-container">
            <button class="btn-new" onclick="solicitarNombreCarpeta()">
                <span class="plus-icon">+</span> Nueva Carpeta
            </button>
        </div>

        <div class="new-folder-container">
            <button class="btn-subir" id="openModal">
                <span class="plus-icon">+</span> Registrar Usuario
            </button>
        </div>

        <a th:href="@{/}" style="font-weight: bold; color: #10b981;">🏠 Principal</a>

        <div class="sidebar-folders">
            <p style="font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px;">
                Mis Carpetas
            </p>

            <div th:each="folder : ${carpetas}" style="margin-bottom: 5px;">
                <a th:href="@{/(folder=${folder.ubicacion.replace('superfolder/', '')})}"
                   style="font-size: 14px; display: flex; align-items: center; gap: 8px;">
                    📁 <span th:text="${folder.nombre}"></span>
                </a>
            </div>
        </div>

        <div class="logout">
            <a th:href="@{/login?logout}">Cerrar sesión</a>
        </div>

        <form id="formCrearCarpeta" th:action="@{/crear-carpeta}" method="post" style="display: none;">
            <input type="hidden" name="nombre" id="inputNombreCarpeta">
            <input type="hidden" name="folderDestino" th:value="${folderActual}">
        </form>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>
                Archivos en:
                <span th:text="${folderActual.isEmpty() ? 'Raíz' : folderActual}" style="color: #10b981;"></span>
            </h2>
        </div>

        <div class="actions">
            <form th:action="@{/subir-archivo}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="folderDestino" th:value="${folderActual}">
                <label class="file-upload">
                    <input type="file" name="archivo" required>
                    <span>📂 Elegir archivo</span>
                </label>
                <button type="submit" class="btn-upload">Subir</button>
            </form>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="archivo : ${archivos}">
                        <td>📄 [[${archivo.nombre}]]</td>
                        <td>
                            <div class="acciones-botones">
                                <a th:href="@{/descargar(archivoId=${archivo.id})}" class="btn-descargar">Descargar</a>
                                <form th:if="${archivo.propietario == usuarioActual}" 
                                      th:action="@{/eliminar}" method="post" 
                                      onsubmit="return confirm('¿Eliminar archivo?');">
                                    <input type="hidden" name="archivoId" th:value="${archivo.id}">
                                    <button type="submit" class="btn-eliminar">Eliminar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${archivos.isEmpty()}">
                        <td colspan="2" style="text-align: center; color: #94a3b8; padding: 40px;">
                            Esta carpeta está vacía.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay" style="display: none;">
  <div class="modal-content">
    <h3>Crear Nueva Cuenta</h3>
    <p>Registra un nuevo usuario en el sistema.</p>
    
    <form id="formRegistroModal">
        <div class="input-group">
            <label>Nombre de usuario</label>
            <input type="text" name="username" placeholder="Nombre" required>
        </div>

        <div class="input-group">
            <label>Apellido</label>
            <input type="text" name="apellido" placeholder="Apellido" required>
        </div>

        <div class="input-group">
            <label>Correo</label>
            <input type="email" name="email" placeholder="correo@dominio.com" required>
        </div>

        <div class="input-group">
            <label>Teléfono</label>
            <input type="tel" name="telefono" placeholder="+573001234567">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" name="clave" placeholder="Mínimo 8 caracteres" required>
        </div>

        <input type="hidden" name="rol" value="ROLE_USER"/>

        <button type="button" class="btn-upload" onclick="enviarRegistro()">Registrar Ahora</button>
    </form>
    
    <hr>
    <button id="closeModal" style="margin-top: 10px; cursor: pointer; background:none; border:none; color:red;">Cerrar</button>
  </div>
</div>

<script>
    const openBtn = document.getElementById('openModal');
    const closeBtn = document.getElementById('closeModal');
    const modal = document.getElementById('modalOverlay');

    openBtn.onclick = () => modal.style.display = 'flex';
    closeBtn.onclick = () => modal.style.display = 'none';

    window.onclick = (event) => {
        if (event.target === modal) modal.style.display = 'none';
    };

    function solicitarNombreCarpeta() {
        let nombre = prompt("Ingresa el nombre de la nueva carpeta:");
        if (nombre != null && nombre.trim() !== "") {
            document.getElementById('inputNombreCarpeta').value = nombre;
            document.getElementById('formCrearCarpeta').submit();
        }
    }

function enviarRegistro() {
    const formulario = document.getElementById('formRegistroModal');
    const formData = new FormData(formulario);
    const datos = Object.fromEntries(formData.entries());

    fetch('/registro/candidato/api', { 
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(datos)
    })
    .then(response => {
        if (response.ok) {
            alert("¡Usuario registrado con éxito! Se ha enviado un correo de activación.");
            document.getElementById('modalOverlay').style.display = 'none';
            formulario.reset();
        } else {
            alert("Error: El correo ya existe o los datos no cumplen los requisitos.");
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert("Error de conexión con el servidor.");
    });
}
</script>

</body>
</html>
