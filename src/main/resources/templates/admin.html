<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Flowmatic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/tokens.css}" />
    <link rel="stylesheet" th:href="@{/css/base.css}" />
    <link rel="stylesheet" th:href="@{/css/admin.css}" />
    <!-- <link rel="stylesheet" th:href="@{/css/admin/admin.css}" /> -->
    <link rel="stylesheet" th:href="@{/css/admin/header.css}" />
    <link rel="stylesheet" th:href="@{/css/admin/cards.css}" />
    <link rel="stylesheet" th:href="@{/css/admin/toolbar.css}" />
    <link rel="stylesheet" th:href="@{/css/admin/table.css}" />
    <link rel="stylesheet" th:href="@{/css/admin/modal.css}" />

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    ></script>

    <script defer th:src="@{/js/admin.js}"></script>
    <script defer th:src="@{/js/i18n.js}"></script>
  </head>

  <body class="admin-body">
    <div class="admin-layout">
      <!--Sidebar-->
      <div th:replace="~{fragments/sidebaradmin :: sidebarAdmin}"></div>

      <div class="admin-main">
        <div class="admin-content">
          <div th:replace="~{fragments/admin/header :: header}"></div>
          <div th:replace="~{fragments/admin/cards :: cards}"></div>
          <div th:replace="~{fragments/admin/toolbar :: toolbar}"></div>
          <div
            th:if="${viewMode == 'usuarios'}"
            th:replace="~{fragments/admin/table :: table}"
          ></div>
          
        </div>
      </div>
    </div>

    <div th:replace="~{fragments/admin/modal-rrhh :: modalRRHH}"></div>
          <div
            th:replace="~{fragments/admin/modal-editar :: modalEditar}"
          ></div>
  </body>
</html>
