<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Panel de Control - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2>Panel de Administración</h2>
        <hr>

        <div class="card mb-4">
            <div class="card-header bg-primary text-white">Registrar Personal de RRHH</div>
            <div class="card-body">
                <form th:action="@{/admin/crear-rrhh}" method="post" class="row g-3">
                    <div class="col-md-3">
                        <input type="text" name="username" class="form-control" placeholder="Username" required>
                    </div>
                    <div class="col-md-3">
                        <input type="email" name="email" class="form-control" placeholder="Email" required>
                    </div>
                    <div class="col-md-3">
                        <input type="password" name="password" class="form-control" placeholder="Password" required>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-success w-100">Crear RRHH</button>
                    </div>
                </form>
            </div>
        </div>

        <table class="table table-hover bg-white shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.username}"></td>
                    <td th:text="${u.email}"></td>
                    <td><span class="badge bg-info text-dark" th:text="${u.rol}"></span></td>
                    <td th:text="${u.estado}"></td>
                    <td>
                        <form th:action="@{/admin/eliminar/{id}(id=${u.id})}" method="post" style="display:inline;">
                            <button class="btn btn-danger btn-sm" onclick="return confirm('¿Seguro?')">Eliminar</button>
                        </form>
                        <button class="btn btn-warning btn-sm">Editar</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
