<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña — Flowmatic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/password.css}">
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="loader"></div>
</div>
<body class="page-auth">

<div class="loader-overlay" id="loader">
  <div class="loader"></div>
</div>

            <div th:if="${errorPassword}" class="alert alert-error">
                La contraseña debe tener mínimo 8 caracteres
            </div>

            <form th:if="${param.success == null}" th:action="@{/reset-password}" method="post" id="formReset">
<div class="split-container">

  <div class="split-form">
    <div class="split-form-box">

      <div style="display:flex; justify-content:center; margin-bottom:20px;">
        <a th:href="@{/}" title="Ir al inicio" class="logo-link">
          <span th:replace="~{fragments/logo :: logoFull}"></span>
        </a>
      </div>

      <h2 style="text-align:center; margin-bottom:8px;">Nueva contraseña</h2>
      <p style="text-align:center; font-size:13px; color:var(--fm-text-muted); margin-bottom:24px;">
        Ingresa tu nueva contraseña para continuar.
      </p>

      <div th:if="${success != null or param.success != null}" class="alert alert-success">
        Contraseña actualizada correctamente
      </div>
      <div th:if="${errorPassword}" class="alert alert-error">
        La contraseña debe tener mínimo 8 caracteres
      </div>

      <form th:if="${param.success == null}"
            th:action="@{/reset-password}"
            method="post"
            id="formReset">

        <input type="hidden" name="token" th:value="${token}"/>

        <div class="form-group">
          <label class="form-label">Nueva contraseña</label>
          <input class="form-input" type="password" name="password" required
                 minlength="8" maxlength="100" placeholder="Mínimo 8 caracteres"/>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Cambiar contraseña</button>
      </form>

      <div style="margin-top:16px; text-align:center;">
        <a class="fm-link" th:href="@{/login}">← Ir al inicio de sesión</a>
      </div>

    </div>
  </div>

  <div class="split-visual">
    <div class="split-visual-decor" style="top:-80px; right:-80px; width:160px; height:160px;"></div>
    <div class="split-visual-decor" style="bottom:-60px; left:-60px; width:120px; height:120px;"></div>
    <div class="split-visual-decor" style="top:33%; left:28%; width:80px; height:80px; border-width:1px;"></div>

    <div class="split-visual-content">
      <a th:href="@{/}" title="Ir al inicio" class="logo-link">
        <span th:replace="~{fragments/logo :: logoFull}"></span>
      </a>
      <p class="split-visual-tagline">Flowmatic — Gestión de Talento</p>
    </div>
</div>

<script>
const form = document.getElementById("formReset");
if(form){
    form.addEventListener("submit", () => {
        document.getElementById("loader").style.display = "flex";
    });
}
</script>
  </div>

</div>

<script>
  const form = document.getElementById("formReset");
  if (form) {
    form.addEventListener("submit", () => {
      document.getElementById("loader").style.display = "flex";
    });
  }
</script>
</body>
</html>
