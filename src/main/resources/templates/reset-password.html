<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nueva contraseña</title>
    <link rel="stylesheet" th:href="@{/css/password.css}">
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="loader"></div>
</div>

<div class="container">
    <div class="form-section">
        <div class="form-box">
            <h2>Cambiar contraseña</h2>

            <div th:if="${success != null or param.success != null}" class="alert alert-success">
                ✅ Contraseña actualizada correctamente
            </div>

            <form th:if="${param.success == null}" th:action="@{/reset-password}" method="post" id="formReset">
                <input type="hidden" name="token" th:value="${token}" />

                <div class="input-group">
                    <label>Nueva contraseña</label>
                    <input type="password" name="password" required />
                </div>

                <button type="submit">Cambiar contraseña</button>
            </form>

            <div style="margin-top: 20px;">
                <a th:href="@{/login}" class="btn-link">Ir al inicio de sesión</a>
            </div>
        </div>
    </div>

    <div class="image-section">
        <video autoplay muted loop class="bg-video">
            <source th:src="@{/videos/flowmatic-reset-password.mp4}" type="video/mp4">
        </video>
    </div>
</div>

<script>
const form = document.getElementById("formReset");
if(form){
    form.addEventListener("submit", () => {
        document.getElementById("loader").style.display = "flex";
    });
}
</script>

</body>
</html>
