<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Recuperar contraseña</title>
    <link rel="stylesheet" th:href="@{/css/password.css}">
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="loader"></div>
</div>

<div class="container">
    <div class="form-section">
        <div class="form-box">
            <h2>Recuperar contraseña</h2>

            <div th:if="${success != null or param.success != null}" class="alert alert-success">
                ✅ Revisa tu correo para continuar
            </div>

            <form th:if="${param.success == null}" 
                  th:action="@{/forgot-password}" 
                  method="post" 
                  id="formForgot">

                <div class="input-group">
                    <label>Correo</label>
                    <input type="email" name="email" placeholder="Correo" required />
                </div>

                <button type="submit">Enviar enlace</button>
            </form>

            <div style="margin-top: 20px;">
                <a th:href="@{/login}">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>

    <div class="image-section">
        <video autoplay muted loop class="bg-video">
            <source th:src="@{/videos/flowmatic-forgot-password.mp4}" type="video/mp4">
        </video>
    </div>
</div>

<script>
const form = document.getElementById("formForgot");

if(form){
    form.addEventListener("submit", () => {
        document.getElementById("loader").style.display = "flex";
    });
}
</script>

</body>
</html>
