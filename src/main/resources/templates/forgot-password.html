<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Recuperar contraseña — Flowmatic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/password.css}">
</head>
<body class="page-auth">

<div class="loader-overlay" id="loader">
  <div class="loader"></div>
</div>

<div class="split-container">

  <div class="split-form">
    <div class="split-form-box">

      <div style="display:flex; justify-content:center; margin-bottom:20px;">
        <span th:replace="~{fragments/logo :: logoFull}"></span>
      </div>

      <h2 style="text-align:center; margin-bottom:8px;">Recuperar contraseña</h2>
      <p style="text-align:center; font-size:13px; color:var(--fm-text-muted); margin-bottom:24px;">
        Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
      </p>

      <div th:if="${success != null or param.success != null}" class="alert alert-success">
        Revisa tu correo para continuar
      </div>

      <form th:if="${param.success == null}"
            th:action="@{/forgot-password}"
            method="post"
            id="formForgot">

        <div class="form-group">
          <label class="form-label">Correo electrónico</label>
          <input class="form-input" type="email" name="email" required
                 placeholder="correo@empresa.com"/>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Enviar enlace</button>
      </form>

      <div style="margin-top:16px; text-align:center;">
        <a class="fm-link" th:href="@{/login}">← Volver al inicio de sesión</a>
      </div>

    </div>
  </div>

  <div class="split-visual">
    <div class="split-visual-decor" style="top:-80px; right:-80px; width:160px; height:160px;"></div>
    <div class="split-visual-decor" style="bottom:-60px; left:-60px; width:120px; height:120px;"></div>
    <div class="split-visual-decor" style="top:33%; left:28%; width:80px; height:80px; border-width:1px;"></div>

    <div class="split-visual-content">
      <span th:replace="~{fragments/logo :: logoFull}"></span>
      <p class="split-visual-tagline">Flowmatic — Gestión de Talento</p>
    </div>
  </div>

</div>

<script>
  const form = document.getElementById("formForgot");
  if (form) {
    form.addEventListener("submit", () => {
      document.getElementById("loader").style.display = "flex";
    });
  }
</script>
</body>
</html>
