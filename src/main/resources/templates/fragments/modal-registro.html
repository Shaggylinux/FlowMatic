<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<div th:fragment="modalRegistro(modalId, formId, closeBtnId)"
     th:id="${modalId}"
     class="modal-overlay" style="display:none;" sec:authorize="hasRole('RRHH')">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Registrar Nuevo Candidato</h3>
      <button th:id="${closeBtnId}" class="modal-close"
              th:data-close-target="${modalId}"
              onclick="document.getElementById(this.dataset.closeTarget).style.display='none'"
              aria-label="Cerrar">&times;</button>
    </div>
    <form th:id="${formId}" style="padding:4px 0;">
      <div class="gc-field-card">
        <label class="gc-field-label">Nombre</label>
        <input type="text" name="username" class="gc-field-input" required>
      </div>
      <div class="gc-field-card">
        <label class="gc-field-label">Apellido</label>
        <input type="text" name="apellido" class="gc-field-input" required>
      </div>
      <div class="gc-field-card">
        <label class="gc-field-label">Correo</label>
        <input type="email" name="email" class="gc-field-input" required>
      </div>
      <div class="gc-field-card">
        <label class="gc-field-label">Contraseña</label>
        <input type="password" name="clave" class="gc-field-input" required>
      </div>
      <input type="hidden" name="rol" value="ROLE_CANDIDATO">
      <button type="button" class="gc-modal-btn"
              th:attr="data-modal-id=${modalId}, data-form-id=${formId}"
              onclick="enviarRegistro(this.dataset.modalId, this.dataset.formId)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        Registrar
      </button>
    </form>
  </div>
</div>

<script>
  function enviarRegistro(modalId, formId) {
    var modal = document.getElementById(modalId);
    var form = document.getElementById(formId);
    if (!modal || !form) return;
    var datos = Object.fromEntries(new FormData(form).entries());
    fetch('/registro/candidato/api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(datos)
    }).then(function(res) {
      if (res.ok) {
        modal.style.display = 'none';
        form.reset();
        location.reload();
      } else {
        alert('Error al registrar candidato');
      }
    }).catch(function() {
      alert('Error de conexión al registrar candidato');
    });
  }
</script>
</body>
</html>
