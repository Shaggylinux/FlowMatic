<div
  class="modal fade"
  id="modalEditar"
  tabindex="-1"
  aria-labelledby="modalEditarLabel"
  aria-hidden="true"
  th:fragment="modalEditar"
>
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <!-- HEADER -->
      <div class="modal-header">
        <div>
          <h5
            class="modal-title"
            id="modalEditarLabel"
            style="font-weight: 700"
          >
            Editar usuario
          </h5>

          <p class="modal-subtitle">
            Actualiza los datos del usuario seleccionado.
          </p>
        </div>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Cerrar"
        ></button>
      </div>

      <!-- FORMULARIO -->
      <form th:action="@{/admin/editar}" method="post">
        <div class="modal-body">
          <!-- ID OCULTO -->
          <input type="hidden" id="edit-id" name="id" />

          <div class="admin-modal-grid">
            <!-- NOMBRE -->
            <div class="form-group">
              <label class="form-label" for="edit-username"> Nombre </label>

              <input
                type="text"
                class="form-input"
                id="edit-username"
                name="username"
                placeholder="Nombre"
                required
              />
            </div>

            <!-- APELLIDO -->
            <div class="form-group">
              <label class="form-label" for="edit-apellido"> Apellido </label>

              <input
                type="text"
                class="form-input"
                id="edit-apellido"
                name="apellido"
                placeholder="Apellido"
                required
              />
            </div>

            <!-- EMAIL -->
            <div class="form-group">
              <label class="form-label" for="edit-email">
                Correo electrónico
              </label>

              <input
                type="email"
                class="form-input"
                id="edit-email"
                name="email"
                placeholder="correo@empresa.com"
                required
              />
            </div>

            <!-- CONTRASEÑA -->
            <div class="form-group">
              <label class="form-label" for="edit-clave">
                Nueva contraseña
                <span class="text-muted">(opcional)</span>
              </label>

              <input
                type="password"
                class="form-input"
                id="edit-clave"
                name="nuevaClave"
                placeholder="Mínimo 8 caracteres"
                minlength="8"
                maxlength="100"
              />
            </div>
          </div>
        </div>

        <!-- FOOTER -->
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Cancelar
          </button>

          <button type="submit" class="btn btn-primary">Guardar cambios</button>
        </div>
      </form>
    </div>
  </div>
</div>
