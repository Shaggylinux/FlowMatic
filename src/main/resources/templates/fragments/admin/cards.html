<div class="admin-cards" th:fragment="cards">
  <!-- Total usuarios -->
  <div class="admin-card">
    <div class="admin-card-header">
      <div class="admin-card-icon">👥</div>
      <span class="admin-card-badge"> +12% </span>
    </div>

    <div class="admin-card-body">
      <h2 class="admin-card-number">24</h2>
      <h3 class="admin-card-title">Total usuarios</h3>
      <p class="admin-card-description">Todos los registrados</p>
    </div>
  </div>
  <!-- Usuarios activos -->
  <div class="admin-card">
    <div class="admin-card-header">
      <div class="admin-card-icon">✅</div>
      <span class="admin-card-badge"> +5% </span>
    </div>

    <div class="admin-card-body">
      <h2 class="admin-card-number">20</h2>
      <h3 class="admin-card-title">Activos</h3>
      <p class="admin-card-description">Usuarios habilitados</p>
    </div>
  </div>

  <!-- Pendientes -->
  <div class="admin-card">
    <div class="admin-card-header">
      <div class="admin-card-icon">⏳</div>
      <span class="admin-card-badge"> -2% </span>
    </div>
    <div class="admin-card-body">
      <h2 class="admin-card-number">3</h2>
      <h3 class="admin-card-title">Pendientes</h3>
      <p class="admin-card-description">En proceso de registro</p>
    </div>
  </div>

  <!-- Administradores -->
  <div class="admin-card">
    <div class="admin-card-header">
      <div class="admin-card-icon">🛡️</div>
      <span class="admin-card-badge"> +1 </span>
    </div>

    <div class="admin-card-body">
      <h2 class="admin-card-number">4</h2>
      <h3 class="admin-card-title">Administradores</h3>
      <p class="admin-card-description">Acceso completo</p>
    </div>
  </div>
</div>
